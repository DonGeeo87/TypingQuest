name: Agent Orchestrator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  orchestrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run orchestrator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/agent-orchestrator.mjs

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-dashboard
          path: |
            agent-system/dashboard.json
            agent-system/dashboard.md
            agent-system/dashboard.html

